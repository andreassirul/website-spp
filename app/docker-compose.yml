version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simsppa_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - simsppa_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: simsppa_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - simsppa_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: simsppa_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: simsppa
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - simsppa_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: simsppa_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - simsppa_network

networks:
  simsppa_network:
    driver: bridge

volumes:
  dbdata:
    driver: local
